<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villamo Growth — Podcast Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .bg {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .bands-wrap {
    position: absolute;
    inset: -200%;
    width: 500%;
    height: 500%;
    display: flex;
    flex-direction: column;
    transform: rotate(-18deg);
    transform-origin: center center;
    animation: slideBands 40s linear infinite;
  }

  @keyframes slideBands {
    0%   { transform: rotate(-18deg) translateY(0); }
    100% { transform: rotate(-18deg) translateY(185px); }
  }

  .band {
    width: 100%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    overflow: hidden;
    white-space: nowrap;
  }

  .band-logos {
    display: inline-flex;
    align-items: center;
    gap: 32px;
    padding-right: 32px;
    animation: slideLogos 55s linear infinite;
  }

  .band:nth-child(even) .band-logos {
    animation-direction: reverse;
    animation-duration: 65s;
  }

  @keyframes slideLogos {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .band-thick { height: 130px; }
  .band-thin  { height: 55px; background: #0f0f0f; }

  .band-d1 { background: #0A0A0A; }
  .band-d2 { background: #111111; }
  .band-d3 { background: #141414; }
  .band-d4 { background: #0c130d; }

  .vg-logo {
    height: 100px;
    width: 100px;
    object-fit: contain;
    flex-shrink: 0;
    border-radius: 10px;
    opacity: 0.85;
  }

  .band-thin .vg-logo { height: 44px; width: 44px; opacity: 0.35; }
  .vg-logo.dim    { opacity: 0.22; }
  .vg-logo.bright { opacity: 1; filter: drop-shadow(0 0 10px #22C55E66); }

  .band-text {
    background: #22C55E;
    height: 46px;
    display: flex;
    align-items: center;
    overflow: hidden;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .band-text .ticker {
    display: inline-flex;
    animation: slideText 45s linear infinite;
  }

  @keyframes slideText {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .band-text span {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: #0A0A0A;
    padding: 0 24px;
  }
  .band-text span.dot { padding: 0; font-size: 9px; opacity: 0.45; }

  .noise {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
<div class="bg">
  <div class="bands-wrap" id="bandsWrap"></div>
  <div class="noise"></div>
</div>
